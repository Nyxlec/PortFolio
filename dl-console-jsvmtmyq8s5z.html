<!doctype html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
<meta name="googlebot" content="noindex,nofollow" />
<meta name="referrer" content="no-referrer" />
<title>Console</title>
<meta name="theme-color" content="#0A0B0F" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230A0B0F'/></svg>" />

<link rel="stylesheet" href="assets/style.css" />
<link rel="stylesheet" href="assets/admin.css" />
</head>
<body class="admin-body">

<!-- ÉCRAN DE LOGIN -->
<section class="admin-gate" id="adminGate">
  <div class="gate-card">
    <div class="gate-head">
      <div class="gate-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
      </div>
      <div>
        <h1>Console privée</h1>
        <p class="mono muted">// authentification requise</p>
      </div>
    </div>

    <form id="loginForm" novalidate>
      <label class="field">
        <span class="field-label mono">// email</span>
        <input type="email" id="loginEmail" required autocomplete="username" placeholder="admin@exemple.com" />
      </label>
      <label class="field">
        <span class="field-label mono">// mot de passe</span>
        <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="••••••••" />
      </label>
      <button type="submit" class="btn primary" id="loginBtn">
        <span class="lbl">Se connecter</span>
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
      <div class="form-status" id="loginStatus" role="status" aria-live="polite"></div>
    </form>

    <p class="gate-foot mono">// accès restreint · toute tentative est journalisée</p>
  </div>
</section>

<!-- DASHBOARD -->
<main class="admin-app" id="adminApp" hidden>
  <header class="admin-nav">
    <div class="wrap nav-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5L12 4l9 7.5"/><path d="M5 10.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9.5"/></svg>
        </span>
        <span class="brand-meta">
          <span class="name">Console</span>
          <span class="role">Messages reçus</span>
        </span>
      </div>
      <div class="admin-actions">
        <span class="admin-user mono muted" id="adminUser"></span>
        <button class="btn ghost" id="refreshBtn" title="Rafraîchir">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.5-6.3M21 12a9 9 0 0 1-15.5 6.3"/><path d="M21 4v5h-5M3 20v-5h5"/></svg>
          Rafraîchir
        </button>
        <button class="btn" id="logoutBtn">Déconnexion</button>
      </div>
    </div>
  </header>

  <section class="admin-main">
    <div class="wrap">
      <div class="admin-toolbar">
        <div class="kpi-row" id="kpiRow">
          <div class="kpi"><span class="kpi-k">Total</span><span class="kpi-v" id="kpiTotal">—</span></div>
          <div class="kpi"><span class="kpi-k">Non lus</span><span class="kpi-v accent" id="kpiUnread">—</span></div>
          <div class="kpi"><span class="kpi-k">7 derniers jours</span><span class="kpi-v" id="kpi7d">—</span></div>
        </div>
        <div class="filter-row">
          <input type="search" id="searchInput" placeholder="Rechercher (nom, email, contenu)…" />
          <select id="filterSelect">
            <option value="all">Tous les messages</option>
            <option value="unread">Non lus uniquement</option>
            <option value="read">Lus uniquement</option>
          </select>
        </div>
      </div>

      <div class="msg-layout">
        <aside class="msg-list" id="msgList" aria-label="Liste des messages">
          <div class="msg-empty">Chargement…</div>
        </aside>
        <article class="msg-detail" id="msgDetail">
          <div class="msg-empty-detail">
            <div class="empty-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16v12H4z"/><path d="M4 6l8 7 8-7"/></svg>
            </div>
            <p class="muted">Sélectionnez un message pour le lire.</p>
          </div>
        </article>
      </div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="assets/supabase-config.js"></script>
<script src="assets/admin.js"></script>
</body>
</html>
